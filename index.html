<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Trắc Nghiệm HTML, CSS & Javascript</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --secondary-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --accent-color: #8b5cf6;
            --card-bg: rgba(31, 41, 55, 0.4);
            --correct-bg: rgba(16, 185, 129, 0.15);
            --correct-border: #10b981;
            --incorrect-bg: rgba(239, 68, 68, 0.15);
            --incorrect-border: #ef4444;
            --font-main: 'Outfit', sans-serif;
            --font-header: 'Space Grotesk', sans-serif;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        [data-theme="light"] {
            --bg-color: #f3f4f6;
            --container-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-color: #1f2937;
            --text-muted: #4b5563;
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --secondary-gradient: linear-gradient(135deg, #059669 0%, #047857 100%);
            --accent-color: #6d28d9;
            --card-bg: rgba(243, 244, 246, 0.6);
            --correct-bg: rgba(5, 150, 105, 0.1);
            --correct-border: #059669;
            --incorrect-bg: rgba(220, 38, 38, 0.1);
            --incorrect-border: #dc2626;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            margin-top: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .logo-icon {
            font-size: 2.2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        h1 {
            font-family: var(--font-header);
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 400;
        }

        /* Config Card */
        .config-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .select-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 10px;
            font-family: var(--font-main);
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
        }

        .select-input:focus {
            border-color: var(--accent-color);
        }

        .search-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 10px;
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 14px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-val {
            font-weight: 700;
            font-family: var(--font-header);
        }

        .stat-val.correct {
            color: var(--correct-border);
        }

        .stat-val.incorrect {
            color: var(--incorrect-border);
        }

        /* Progress Bar */
        .progress-wrapper {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-gradient);
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        /* Quiz view options */
        .quiz-view-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .view-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            border-color: var(--text-muted);
        }

        /* Question Card */
        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .q-number {
            font-family: var(--font-header);
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--accent-color);
        }

        .q-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .q-text {
            font-size: 1.12rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 25px;
            white-space: pre-wrap;
        }

        .q-text code {
            font-family: 'Consolas', 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.25);
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 0.92rem;
            border: 1px solid var(--border-color);
            color: #f43f5e;
            white-space: pre-wrap;
        }

        .q-text pre {
            margin-top: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 0.9rem;
        }

        .q-text pre code {
            background: transparent;
            border: none;
            padding: 0;
            color: inherit;
        }

        /* Choice options */
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 16px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 1rem;
            text-align: left;
            font-weight: 400;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .choice-btn:hover:not(.checked) {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(4px);
        }

        .choice-letter {
            font-family: var(--font-header);
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
        }

        .choice-btn.correct {
            background: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        .choice-btn.correct .choice-letter {
            background: var(--correct-border);
            color: white;
            border-color: var(--correct-border);
        }

        .choice-btn.incorrect {
            background: var(--incorrect-bg) !important;
            border-color: var(--incorrect-border) !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
        }

        .choice-btn.incorrect .choice-letter {
            background: var(--incorrect-border);
            color: white;
            border-color: var(--incorrect-border);
        }

        .choice-btn.disabled {
            cursor: not-allowed;
            pointer-events: none;
        }

        .choice-text {
            line-height: 1.5;
            padding-top: 1px;
            white-space: pre-wrap;
        }

        .choice-text code {
            font-family: 'Consolas', 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* Explanation area */
        .explanation {
            margin-top: 20px;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 4px solid var(--accent-color);
            border-radius: 4px 14px 14px 4px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exp-title {
            font-family: var(--font-header);
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-family: var(--font-header);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Result View */
        .result-view {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease-out;
        }

        .result-score {
            font-size: 3.5rem;
            font-family: var(--font-header);
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .result-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            background: var(--correct-bg);
            border: 1px solid var(--correct-border);
            color: var(--correct-border);
            font-weight: 600;
            margin-bottom: 25px;
        }

        .result-details {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .result-stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 18px 24px;
            border-radius: 16px;
            min-width: 140px;
        }

        .result-stat-lbl {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .result-stat-val {
            font-family: var(--font-header);
            font-size: 1.6rem;
            font-weight: 700;
        }

        /* Floating theme toggle */
        .theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--container-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: var(--shadow);
            z-index: 100;
            transition: transform 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* Footer */
        footer {
            margin-top: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 16px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .config-card {
                grid-template-columns: 1fr;
            }
            .result-details {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }
            .result-stat-card {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <span class="logo-icon">&lt;/&gt;</span>
            <h1>Hệ Thống Trắc Nghiệm Ôn Tập</h1>
        </div>
        <p class="subtitle">HTML, CSS & Javascript (<span id="total-questions-count">0</span> câu hỏi, Trộn đề ngẫu nhiên)</p>
    </header>

    <!-- Configuration panel -->
    <div class="config-card">
        <div class="control-group">
            <span class="control-label">Đảo đề ngẫu nhiên (Mặc định bật)</span>
            <div style="display: flex; gap: 20px; margin-top: 5px;">
                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.95rem;">
                    <input type="checkbox" id="shuffle-questions" onchange="resetQuiz()" checked> Đảo câu hỏi
                </label>
                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.95rem;">
                    <input type="checkbox" id="shuffle-options" onchange="resetQuiz()" checked> Đảo đáp án
                </label>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">Tìm kiếm câu hỏi</span>
            <input type="text" id="search-input" class="search-bar" placeholder="Nhập từ khóa cần tìm..." oninput="handleSearch()">
        </div>
    </div>

    <!-- Layout options -->
    <div class="quiz-view-tabs">
        <button class="view-btn active" id="view-single" onclick="setViewMode('single')">Làm từng câu</button>
        <button class="view-btn" id="view-all" onclick="setViewMode('all')">Xem tất cả</button>
    </div>

    <!-- Stats summary -->
    <div class="stats-bar" id="stats-panel">
        <div class="stat-item">
            <span>Tiến độ:</span>
            <span id="stat-progress" class="stat-val">0/0</span>
        </div>
        <div class="stat-item">
            <span>Đúng:</span>
            <span id="stat-correct" class="stat-val correct">0</span>
        </div>
        <div class="stat-item">
            <span>Sai:</span>
            <span id="stat-incorrect" class="stat-val incorrect">0</span>
        </div>
        <div class="stat-item">
            <span>Điểm:</span>
            <span id="stat-score" class="stat-val">0%</span>
        </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrapper" id="progress-wrapper">
        <div class="progress-label">
            <span>Tiến trình hoàn thành</span>
            <span id="progress-text">0%</span>
        </div>
        <div class="progress-container">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <!-- Quiz Area -->
    <div id="quiz-area">
        <!-- Questions render here dynamically -->
    </div>

    <!-- Navigation Buttons for Single View -->
    <div class="nav-buttons" id="navigation-panel">
        <button class="btn btn-secondary" id="btn-prev" onclick="navigateQuestion(-1)" disabled>&larr; Câu trước</button>
        <button class="btn btn-primary" id="btn-next" onclick="navigateQuestion(1)">Câu tiếp theo &rarr;</button>
    </div>
</div>

<button class="theme-toggle" onclick="toggleTheme()" title="Thay đổi giao diện">🌓</button>

<footer>
    <p>Hệ thống ôn tập trắc nghiệm tự động &copy; 2026. Thiết kế lấy cảm hứng từ <a href="https://tranvanh07022005-tech.github.io/OnTapKTPM/" target="_blank">OnTapKTPM</a>.</p>
</footer>

<!-- Include the JSON quiz data script -->
<script src="quiz_data.js"></script>

<script>
    // State Variables
    let questions = []; // Active list of questions being displayed
    let originalQuestions = []; // The clean, unmodified active question list
    let userAnswers = {}; // Map of index -> selected choice letter
    let currentSingleIndex = 0; // Current index for 'single' view
    let viewMode = 'single'; // 'single' or 'all'

    // Theme manager
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('quiz-theme', newTheme);
    }

    // Load saved theme on startup
    const savedTheme = localStorage.getItem('quiz-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // Initial load
    window.addEventListener('DOMContentLoaded', () => {
        if (typeof quizData === 'undefined') {
            alert('Lỗi: Không tìm thấy tệp quiz_data.js trong cùng thư mục! Vui lòng tải dữ liệu câu hỏi.');
            return;
        }
        initQuiz();
    });

    function initQuiz() {
        userAnswers = {};
        currentSingleIndex = 0;
        originalQuestions = JSON.parse(JSON.stringify(quizData));
        document.getElementById('total-questions-count').innerText = originalQuestions.length;
        applySettings();
    }

    function setViewMode(mode) {
        if (viewMode === mode) return;
        viewMode = mode;
        
        document.getElementById('view-single').classList.toggle('active', mode === 'single');
        document.getElementById('view-all').classList.toggle('active', mode === 'all');
        
        document.getElementById('navigation-panel').style.display = mode === 'single' ? 'flex' : 'none';
        
        renderQuiz();
    }

    function handleSearch() {
        applySettings();
    }

    function applySettings() {
        let tempQuestions = JSON.parse(JSON.stringify(originalQuestions));

        // 1. Search filter
        const query = document.getElementById('search-input').value.trim().toLowerCase();
        if (query !== '') {
            tempQuestions = tempQuestions.filter(q => {
                let matchesQ = q.q.toLowerCase().includes(query);
                let matchesOptions = Object.values(q.options).some(opt => opt.toLowerCase().includes(query));
                return matchesQ || matchesOptions;
            });
        }

        // 2. Shuffle questions if checked
        const shouldShuffleQ = document.getElementById('shuffle-questions').checked;
        if (shouldShuffleQ) {
            tempQuestions = shuffleArray(tempQuestions);
        }

        // 3. Shuffle options if checked
        const shouldShuffleOpt = document.getElementById('shuffle-options').checked;
        if (shouldShuffleOpt) {
            tempQuestions.forEach(q => {
                const optsArray = Object.entries(q.options);
                const shuffledOptsArray = shuffleArray(optsArray);
                
                const correctValue = q.options[q.answer];
                
                q.options = {};
                const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
                shuffledOptsArray.forEach((opt, idx) => {
                    const letter = letters[idx];
                    q.options[letter] = opt[1];
                    if (opt[1] === correctValue) {
                        q.answer = letter;
                    }
                });
            });
        }

        questions = tempQuestions;
        currentSingleIndex = 0;
        
        renderQuiz();
    }

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function resetQuiz() {
        userAnswers = {};
        currentSingleIndex = 0;
        applySettings();
    }

    // Stats calculations
    function calculateStats() {
        const total = questions.length;
        const answeredKeys = Object.keys(userAnswers);
        const answered = answeredKeys.length;
        
        let correct = 0;
        let incorrect = 0;
        
        answeredKeys.forEach(idx => {
            const index = parseInt(idx);
            if (userAnswers[index] === questions[index].answer) {
                correct++;
            } else {
                incorrect++;
            }
        });

        // Update UI
        document.getElementById('stat-progress').innerText = `${answered}/${total}`;
        document.getElementById('stat-correct').innerText = correct;
        document.getElementById('stat-incorrect').innerText = incorrect;
        
        const scorePercent = answered > 0 ? Math.round((correct / answered) * 100) : 0;
        document.getElementById('stat-score').innerText = `${scorePercent}%`;
        
        // Progress bar
        const progressPercent = total > 0 ? Math.round((answered / total) * 100) : 0;
        document.getElementById('progress-text').innerText = `${progressPercent}%`;
        document.getElementById('progress-fill').style.width = `${progressPercent}%`;

        // Update single view nav buttons state
        document.getElementById('btn-prev').disabled = currentSingleIndex === 0;
        
        const nextBtn = document.getElementById('btn-next');
        if (currentSingleIndex === total - 1) {
            nextBtn.innerText = "Xem kết quả";
        } else {
            nextBtn.innerText = "Câu tiếp theo \u2192";
        }
        nextBtn.disabled = total === 0;
    }

    // Renderer
    function renderQuiz() {
        const quizArea = document.getElementById('quiz-area');
        quizArea.innerHTML = '';
        
        if (questions.length === 0) {
            quizArea.innerHTML = `
                <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                    <h3>📭 Không tìm thấy câu hỏi nào phù hợp với tìm kiếm!</h3>
                </div>
            `;
            calculateStats();
            return;
        }

        if (viewMode === 'single') {
            const q = questions[currentSingleIndex];
            quizArea.appendChild(createQuestionCard(q, currentSingleIndex));
        } else {
            questions.forEach((q, idx) => {
                quizArea.appendChild(createQuestionCard(q, idx));
            });
        }

        calculateStats();
    }

    function createQuestionCard(q, index) {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-card-${index}`;

        // Header
        const header = document.createElement('div');
        header.className = 'q-header';
        
        const number = document.createElement('div');
        number.className = 'q-number';
        number.innerText = `Câu ${index + 1}`;
        
        const badge = document.createElement('div');
        badge.className = 'q-badge';
        badge.innerText = 'Trắc Nghiệm';

        header.appendChild(number);
        header.appendChild(badge);

        // Question text
        const text = document.createElement('div');
        text.className = 'q-text';
        text.innerHTML = formatMarkdown(q.q);

        // Choices
        const choicesContainer = document.createElement('div');
        choicesContainer.className = 'choices';

        const selectedAnswer = userAnswers[index];
        const hasBeenAnswered = typeof selectedAnswer !== 'undefined';

        Object.entries(q.options).forEach(([letter, choiceText]) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            
            const bubble = document.createElement('span');
            bubble.className = 'choice-letter';
            bubble.innerText = letter;

            const textSpan = document.createElement('span');
            textSpan.className = 'choice-text';
            textSpan.innerHTML = formatMarkdown(choiceText);

            btn.appendChild(bubble);
            btn.appendChild(textSpan);

            if (hasBeenAnswered) {
                btn.classList.add('disabled');
                if (letter === q.answer) {
                    btn.classList.add('correct');
                }
                if (selectedAnswer === letter && letter !== q.answer) {
                    btn.classList.add('incorrect');
                }
            } else {
                btn.addEventListener('click', () => handleSelectOption(index, letter));
            }

            choicesContainer.appendChild(btn);
        });

        card.appendChild(header);
        card.appendChild(text);
        card.appendChild(choicesContainer);

        // Render explanation if answered
        if (hasBeenAnswered && (q.explanation || q.answer)) {
            const exp = document.createElement('div');
            exp.className = 'explanation';
            
            const expTitle = document.createElement('div');
            expTitle.className = 'exp-title';
            expTitle.innerHTML = `💡 Giải thích đáp án`;
            
            const expContent = document.createElement('div');
            expContent.innerHTML = q.explanation ? q.explanation : `Đáp án đúng là <strong>${q.answer}</strong> theo ngân hàng câu hỏi chính thức.`;

            exp.appendChild(expTitle);
            exp.appendChild(expContent);
            card.appendChild(exp);
        }

        return card;
    }

    // Safe Markdown Parser
    function escapeHtml(text) {
        if (!text) return "";
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function formatMarkdown(text) {
        if (!text) return "";
        
        const parts = text.split('`');
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
                // Inside backticks: code block. Escape HTML and wrap in <code>
                parts[i] = '<code>' + escapeHtml(parts[i]) + '</code>';
            } else {
                // Outside backticks: normal text.
                let temp = parts[i].replace(/<br\s*\/?>/gi, '\n');
                temp = escapeHtml(temp);
                
                // Format bold **text** -> <strong>text</strong>
                temp = temp.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                // Format italic *text* -> <em>text</em>
                temp = temp.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                
                parts[i] = temp;
            }
        }
        return parts.join('');
    }

    // Action handlers
    function handleSelectOption(questionIndex, selectedLetter) {
        if (typeof userAnswers[questionIndex] !== 'undefined') return;
        
        userAnswers[questionIndex] = selectedLetter;
        
        // Redraw only this card for speed and nice animations
        const card = document.getElementById(`q-card-${questionIndex}`);
        const parent = card.parentNode;
        const newCard = createQuestionCard(questions[questionIndex], questionIndex);
        parent.replaceChild(newCard, card);
        
        calculateStats();

        // If in single mode, auto navigate next after a brief delay if correct
        if (viewMode === 'single' && currentSingleIndex < questions.length - 1) {
            setTimeout(() => {
                if (currentSingleIndex === questionIndex) {
                    navigateQuestion(1);
                }
            }, 1000);
        }
    }

    function navigateQuestion(step) {
        const nextIndex = currentSingleIndex + step;
        if (nextIndex >= 0 && nextIndex < questions.length) {
            currentSingleIndex = nextIndex;
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (nextIndex === questions.length) {
            showSummaryResult();
        }
    }

    function showSummaryResult() {
        const quizArea = document.getElementById('quiz-area');
        const navPanel = document.getElementById('navigation-panel');
        navPanel.style.display = 'none';

        const total = questions.length;
        let correct = 0;
        
        Object.keys(userAnswers).forEach(idx => {
            const index = parseInt(idx);
            if (userAnswers[index] === questions[index].answer) {
                correct++;
            }
        });

        const scorePercent = total > 0 ? Math.round((correct / total) * 100) : 0;
        
        let message = "";
        if (scorePercent === 100) message = "🎉 Tuyệt vời! Bạn đã trả lời đúng tất cả các câu hỏi!";
        else if (scorePercent >= 80) message = "🌟 Rất tốt! Bạn nắm vững kiến thức rất chắc chắn.";
        else if (scorePercent >= 50) message = "👍 Đạt yêu cầu! Tiếp tục ôn luyện thêm nhé.";
        else message = "📚 Cần cố gắng nhiều hơn! Hãy thử ôn tập lại từ đầu.";

        quizArea.innerHTML = `
            <div class="result-view">
                <h2>Kết Quả Ôn Tập</h2>
                <div class="result-score">${scorePercent}%</div>
                <div class="result-badge">${message}</div>
                
                <div class="result-details">
                    <div class="result-stat-card">
                        <div class="result-stat-lbl">Tổng số câu hỏi</div>
                        <div class="result-stat-val">${total}</div>
                    </div>
                    <div class="result-stat-card">
                        <div class="result-stat-lbl">Số câu đúng</div>
                        <div class="result-stat-val" style="color: var(--correct-border);">${correct}</div>
                    </div>
                    <div class="result-stat-card">
                        <div class="result-stat-lbl">Số câu sai</div>
                        <div class="result-stat-val" style="color: var(--incorrect-border);">${total - correct}</div>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="btn btn-primary" onclick="resetQuiz()">Làm lại bài này</button>
                    <button class="btn btn-secondary" onclick="setViewMode('all')">Xem lại chi tiết</button>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
